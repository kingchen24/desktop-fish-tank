<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐟 桌面小鱼缸</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="appContainer">
    <!-- 拖动把手 -->
    <div class="header" id="dragHandle">
      <span class="widget-title">🐟</span>
      <div class="coin-display" id="coinDisplay">
        <span class="coin-amount" id="coinAmount">0</span>
        <span class="coin-label">🫧</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btnShop" title="鱼店 (S)">🏪</button>
        <button class="btn-icon" id="btnCollapse" title="折叠/展开">━</button>
      </div>
    </div>

    <!-- 水族箱画布 -->
    <div class="aquarium-wrapper" id="aquariumWrapper">
      <canvas id="aquarium"></canvas>
    </div>

    <!-- 鱼店面板 -->
    <div class="shop-overlay" id="shopOverlay">
      <div class="shop-panel" id="shopPanel">
        <div class="shop-header">
          <h2>🐠 鱼店</h2>
          <button class="btn-close" id="btnCloseShop">✕</button>
        </div>
        <div class="shop-items" id="shopItems"></div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 离线收益弹窗 -->
    <div class="modal-overlay" id="offlineModal">
      <div class="modal-content">
        <div class="modal-icon">🐟</div>
        <h2>欢迎回来！</h2>
        <p class="modal-desc">你离开了 <strong id="offlineTime">--</strong></p>
        <p class="modal-earn">小鱼们为你赚了</p>
        <p class="modal-coins"><span id="offlineCoins">0</span> 🫧</p>
        <button class="btn btn-primary" id="btnCollectOffline">全部收取</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
